name: Try DQBench (All Categories)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" goldencheck
      - run: dqbench generate
      - run: dqbench run goldencheck

  transform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" goldenflow
      - run: dqbench generate
      - run: dqbench run goldenflow

  er:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" goldenmatch
      - run: dqbench generate --er
      - run: dqbench run goldenmatch

  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" goldenflow goldenmatch
      - run: dqbench generate --pipeline
      - run: dqbench run goldenpipe
