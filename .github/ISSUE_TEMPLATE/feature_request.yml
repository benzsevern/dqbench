name: Feature Request
description: Suggest an improvement or new feature for DQBench
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Why is it needed?
      placeholder: Describe the limitation or pain point you are experiencing.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should DQBench address this?
      placeholder: Describe your ideal solution or approach.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of DQBench does this relate to?
      options:
        - Benchmark Datasets
        - Scoring / Metrics
        - Adapters
        - CLI / UX
        - Documentation
        - Other
    validations:
      required: true
