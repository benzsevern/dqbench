name: Bug Report
description: Report a bug in DQBench
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: DQBench Version
      description: "Run `dqbench --version` and paste the output."
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: Describe what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `dqbench run ...`
        2. ...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: adapter
    attributes:
      label: Adapter Used
      description: Which adapter were you running when the bug occurred?
      options:
        - GoldenCheck
        - Great Expectations
        - Pandera
        - Soda Core
        - Custom
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Paste any relevant error output or traceback.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
